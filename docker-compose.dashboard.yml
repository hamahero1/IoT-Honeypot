version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
# IoT Honeypot — Dashboard-Only Compose
#
# Use this compose file when the honeypot system is already running (via systemd
# or the full docker-compose.yml) and you only need the dashboard services.
#
# Ports:
#   8501 → Dashboard API  (FastAPI — /api/summary, /api/events, WebSocket)
#   8502 → SOC Dashboard  (static HTML prototype — the main UI)
#
# The two volumes below MUST point to directories that already contain data:
#   UNIFIED_EVENTS_DIR  → folder holding unified_events.jsonl
#   PREDICTIONS_DIR     → folder holding predictions.jsonl
#   LOGS_DIR            → folder holding per-protocol JSONL logs
#
# Override with environment variables before running:
#   export UNIFIED_EVENTS_DIR=/opt/iot-honeypot/normalized
#   export PREDICTIONS_DIR=/opt/iot-honeypot/ml-engine/output
#   export LOGS_DIR=/opt/iot-honeypot/logs
#   docker compose -f docker-compose.dashboard.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Dashboard API (FastAPI on :8501) ───────────────────────────────────────
  dashboard-api:
    build: ./dashboard-api
    container_name: iot-dashboard-api
    restart: always
    ports:
      - "8501:8501"
    volumes:
      - ${UNIFIED_EVENTS_DIR:-../normalized}:/opt/iot-honeypot/normalized:ro
      - ${PREDICTIONS_DIR:-../ml-engine/output}:/opt/iot-honeypot/ml-engine/output:ro
      - ${LOGS_DIR:-../logs}:/opt/iot-honeypot/logs:ro
    environment:
      - DASHBOARD_MAX_EVENTS=8000
      - DASHBOARD_MAX_ROUTES=8000
      - DASHBOARD_WINDOW_PACKETS=2500
      - DASHBOARD_MAX_PREDICTIONS=3000
      - DASHBOARD_MAX_IP_DETAILS=1500
      - DASHBOARD_DATASET_MAX_AGE_SECONDS=8
      - OMP_NUM_THREADS=1

  # ── SOC Dashboard Prototype (static HTML on :8502) ────────────────────────
  dashboard-ui:
    build: ./dashboard-ui
    container_name: iot-dashboard-ui
    restart: always
    ports:
      - "8502:8502"
